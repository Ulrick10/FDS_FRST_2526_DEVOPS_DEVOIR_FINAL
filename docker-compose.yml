services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-nodejs-ulrick
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@db:5432/expense_tracker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: expense_tracker
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - expense-network

  db:
    image: postgres:15-alpine
    container_name: expense-tracker-postgres-ulrick
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - expense-network

volumes:
  postgres_data:
    driver: local

networks:
  expense-network:
    driver: bridge